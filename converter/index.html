<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片轉換工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>圖片格式轉換</h1>
    <p class="subtitle">支援 JPG、PNG、WEBP、BMP</p>

    <!-- 拖放區域 -->
    <div class="drop-zone" id="dropZone">
      <p>📂 拖放圖片到這裡</p>
      <p>或</p>
      <button onclick="document.getElementById('fileInput').click()">選擇檔案</button>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- 預覽圖片 -->
    <img id="preview" src="" alt="預覽" hidden>

    <!-- 選擇格式 -->
    <div class="format-select" id="formatSelect" hidden>
      <p>選擇轉換格式：</p>
      <button onclick="convert('jpg')">JPG</button>
      <button onclick="convert('png')">PNG</button>
      <button onclick="convert('webp')">WEBP</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
